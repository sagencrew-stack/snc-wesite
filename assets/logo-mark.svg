<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100" fill="none">
  <!-- Gold gradient definitions -->
  <defs>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#F4D77A"/>
      <stop offset="35%" stop-color="#E8C055"/>
      <stop offset="65%" stop-color="#C99B2C"/>
      <stop offset="100%" stop-color="#A8881F"/>
    </linearGradient>
    <linearGradient id="goldDeep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A8881F"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#E8CB6E" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#D4AF37" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft outer glow behind the ring -->
  <circle cx="50" cy="50" r="48" fill="url(#goldGlow)"/>

  <!-- Outer ring (thick) -->
  <circle cx="50" cy="50" r="38" stroke="url(#goldRing)" stroke-width="4" fill="none"/>

  <!-- Inner ring (thinner, slightly inset) -->
  <circle cx="50" cy="50" r="30" stroke="url(#goldRing)" stroke-width="2.2" fill="none" opacity="0.85"/>

  <!-- Sage "S" letter inside ring -->
  <path d="M 60 36
           C 60 32, 56 30, 50 30
           C 42 30, 38 34, 38 40
           C 38 46, 42 48, 50 50
           C 58 52, 62 54, 62 60
           C 62 66, 58 70, 50 70
           C 44 70, 40 68, 40 64"
        stroke="#9DB89F" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Gold "S" overlay (slightly forward, thinner) -->
  <path d="M 60 36
           C 60 32, 56 30, 50 30
           C 42 30, 38 34, 38 40
           C 38 46, 42 48, 50 50
           C 58 52, 62 54, 62 60
           C 62 66, 58 70, 50 70
           C 44 70, 40 68, 40 64"
        stroke="url(#goldDeep)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Small notch marks on left and right of outer ring (the gaps in the rings) -->
  <rect x="9" y="48" width="6" height="4" fill="#0B1F3A" opacity="0"/>
  <rect x="85" y="48" width="6" height="4" fill="#0B1F3A" opacity="0"/>

  <!-- Left side connector dots -->
  <circle cx="6" cy="50" r="1.6" fill="#9DB89F"/>
  <circle cx="12" cy="50" r="2.2" fill="url(#goldDeep)"/>

  <!-- Right side connector dots -->
  <circle cx="88" cy="50" r="2.2" fill="url(#goldDeep)"/>
  <circle cx="94" cy="50" r="1.6" fill="#9DB89F"/>

  <!-- Subtle sparkle accents -->
  <circle cx="32" cy="22" r="1.2" fill="#F4E68A" opacity="0.85"/>
  <circle cx="72" cy="78" r="1" fill="#F4E68A" opacity="0.7"/>
</svg>
